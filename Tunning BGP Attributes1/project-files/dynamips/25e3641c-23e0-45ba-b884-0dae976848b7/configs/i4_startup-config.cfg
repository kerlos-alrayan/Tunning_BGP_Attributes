!

!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname R4
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
!
!
no ip domain lookup
no ipv6 cef
!
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
!
!
!
!
!
!
!
interface Ethernet0/0
 no ip address
 shutdown
 duplex auto
!
interface GigabitEthernet0/0
 no ip address
 shutdown
 media-type gbic
 speed 1000
 duplex full
 negotiation auto
!
interface Serial1/0
 ip address 20.0.0.2 255.255.255.0
 serial restart-delay 0
!
interface Serial1/1
 ip address 200.8.8.1 255.255.255.0
 serial restart-delay 0
!
interface Serial1/2
 ip address 30.0.0.1 255.255.255.0
 serial restart-delay 0
!
interface Serial1/3
 ip address 70.0.0.1 255.255.255.0
 serial restart-delay 0
!
!
router eigrp 100
 network 200.8.8.0
 redistribute bgp 2000
!
router bgp 2000
 bgp log-neighbor-changes
 redistribute eigrp 100
 neighbor 20.0.0.1 remote-as 1000
 neighbor 20.0.0.1 route-map net2000 out
 neighbor 30.0.0.2 remote-as 3000
 neighbor 70.0.0.2 remote-as 4000
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
access-list 1 permit 200.5.5.0 0.0.0.255
!
route-map net200 permit 10
 set as-path prepend 40 50 60 70 80
!
route-map net2005 permit 20
!
!
!
control-plane
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
